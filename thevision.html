<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Timeless Films</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Jost:wght@400;500&display=swap" rel="stylesheet">

<style>
html,
body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
}

body {
    font-family: "Jost", sans-serif;
    cursor: url("cursor.png") 24 24, auto;
}

/* Vídeo de fons */

video {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* Capa fosca opcional per llegir millor el text */

.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.2);
}

/* Eslògan */

.slogan {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);

    font-family: "DM Serif Display", serif;
    font-size: 40px;

    line-height: 0.9;
    text-align: center;
    color: white;

    z-index: 2;
}

/* Mòbil */

@media (max-width: 768px) {
    .slogan {
        font-size: 52px;
        width: 90%;
    }
}

@media (max-width: 480px) {
    .slogan {
        font-size: 38px;
    }
}

.watch-btn a {
    color: #b71b16;
    font-family: "Jost", sans-serif;
    font-size: 14px;
    letter-spacing: 3px;
    text-decoration: none;
}
.watch-btn a:hover {
    text-decoration: underline;
}

</style>
</head>

<body>

    <video autoplay muted loop playsinline>
        <source src="images/tvvideo.mp4" type="video/mp4">
    </video>

    <div class="overlay">
    </div>

    <div class="slogan">
        timeless films<br>
        for today's lovers.
        <div class="watch-btn">
          <a href="index.html">WATCH THE FILMS
          </a>
        </div>
    </div>
</body>
</html>
